release_archive_submodules:
  stage: deploy
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  interruptible: false
  variables:
    GIT_STRATEGY: clone
  script:
    - if [[ -n "${RELEASE}" ]] ; then exit 0; fi
    # Archive all the code, including git submodules and upload as generic package.
    - git-archive-all "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip"
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip" "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip"'
    - git-archive-all "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz"
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz" "${PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz"'
    # Upload to AWS S3 so build scripts can pick it up.
    - aws s3 cp "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip" "s3://release.inivation.com/libcaer/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.zip"
    - aws s3 cp "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz" "s3://release.inivation.com/libcaer/${CI_PROJECT_NAME}-${CI_COMMIT_TAG}.tar.gz"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE && $RELEASE_VERSION

pages:
  stage: build
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:docs
  interruptible: false
  tags:
    - docker
    - ubuntu
    - build
  variables:
    GIT_STRATEGY: clone
  script:
    - cd docs
    - python3 docs-build.py "${CI_COMMIT_REF_NAME}" "${CI_DEFAULT_BRANCH}"
    - cp -R build ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
  resource_group: "${CI_JOB_NAME}"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - docs/build
    policy: pull-push

release_ubuntu:
  stage: deploy
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  interruptible: false
  needs: [ "release_archive_submodules" ]
  before_script:
    - gpg --pinentry-mode loopback --passphrase "${PPA_GPG_KEY_PASS}" --import "${PPA_GPG_KEY}"
    - echo -e "5\ny\n" | gpg --no-tty --command-fd 0 --edit-key "${PPA_GPG_KEY_ID}" trust quit
    - *version_name
  script:
    - cd packaging/ubuntu-source-package/
    - ./packageUbuntu.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}" --distro bionic --gpg-key-id "${PPA_GPG_KEY_ID}" --gpg-key-pass "${PPA_GPG_KEY_PASS}" --upload
    - sleep 60 # rate-limit connections to PPA upload server
    - ./packageUbuntu.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}" --distro focal --gpg-key-id "${PPA_GPG_KEY_ID}" --gpg-key-pass "${PPA_GPG_KEY_PASS}" --upload
    - sleep 60 # rate-limit connections to PPA upload server
    - ./packageUbuntu.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}" --distro jammy --gpg-key-id "${PPA_GPG_KEY_ID}" --gpg-key-pass "${PPA_GPG_KEY_PASS}" --upload
    - sleep 60 # rate-limit connections to PPA upload server
    - ./packageUbuntu.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}" --distro noble --gpg-key-id "${PPA_GPG_KEY_ID}" --gpg-key-pass "${PPA_GPG_KEY_PASS}" --upload
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "Ubuntu" && $RELEASE_VERSION

release_fedora:
  stage: deploy
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/fedora:latest
  interruptible: false
  needs: [ "release_archive_submodules" ]
  before_script:
    - mkdir -p ~/.config/
    - cp "${COPR_API_KEY}" ~/.config/copr
    - *version_name
  script:
    - cd packaging/fedora-source-package/
    - ./packageFedora.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
    - copr-cli build --nowait inivation/inivation "${CI_PROJECT_NAME}-${VERSION_NAME}-0.fc36.src.rpm"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "Fedora" && $RELEASE_VERSION

release_gentoo_brew:
  stage: deploy
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/gentoo:latest
  interruptible: false
  needs: [ "release_archive_submodules" ]
  before_script:
    - mkdir -p ~/.ssh/
    - cp "${GITCI_SSH_KEY}" ~/.ssh/id_ed25519
    - chmod 0600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - cp "${GITCI_SSH_CONF}" ~/.gitconfig
    - *version_name
  script:
    - cd packaging/linux/
    # Gentoo release
    - ./gentoo-release.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}" --pkg-category "dev-libs"
    # Brew release
    - ./brew-release.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "GentooBrew" && $RELEASE_VERSION

release_arch:
  stage: deploy
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/archlinux:latest
  interruptible: false
  needs: [ "release_archive_submodules" ]
  before_script:
    - mkdir -p ~/.ssh/
    - cp "${GITCI_SSH_KEY}" ~/.ssh/id_ed25519
    - chmod 0600 ~/.ssh/id_ed25519
    - ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
    - ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
    - cp "${GITCI_SSH_CONF}" ~/.gitconfig
    - *version_name
  script:
    - cd packaging/linux/
    # Arch release
    - ./arch-release.sh --pkg-name "${CI_PROJECT_NAME}" --pkg-version "${VERSION_NAME}"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web" && $RELEASE == "Arch" && $RELEASE_VERSION

# Run pre-commit on all files to make sure it was run on client.
# This will do all formatting checks in a consistent way.
pre-commit_check:
  stage: build
  image: registry.gitlab.com/synsense-sys-int/inivation/infra/docker-files/ubuntu:rolling
  before_script:
    - pre-commit install
  script:
    - pre-commit run -a
  rules:
    - if: $CI_COMMIT_BRANCH
